<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 Page</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
/*--------------------
Body
--------------------*/
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(0deg, #202239, #8595AC);
}

::selection {
  background: #CDD4DE;
}

/*--------------------
Page
--------------------*/
.page {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 800px;
  height: 600px;
  transform: translate(-50%, -50%);
  z-index: 1;
  background: #0D0C1E;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/*--------------------
Header
--------------------*/
header {
  padding: 30px;
  position: relative;
}

.logo {
  margin: 0 auto;
  text-align: center;
  margin-bottom: -17px;
}

.logo svg {
  width: 61px;
  height: 14px;
}

nav {
  cursor: pointer;
  width: 18px;
  height: 18px;
  position: relative;
  float: left;
}

nav::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: #565c73;
  border-radius: 2px;
  box-shadow:
    0 5px 0 #565c73,
    0 10px 0 #565c73;
}

.search {
  float: right;
  cursor: pointer;
}

.search svg {
  width: 16px;
  height: 16px;
}

/*--------------------
Content
--------------------*/
.content {
  text-align: center;
  padding-top: 118px;
  color: #CDD4DE;
  position: relative;
  z-index: 2;
}

.content h1 {
  font-weight: 900;
  font-size: 165px;
  line-height: 1;
  margin-bottom: -10px;
  opacity: 0.6;
}

.content h2 {
  font-weight: 700;
  font-size: 34px;
  margin-bottom: 6px;
  opacity: 0.9;
}

.content p {
  font-weight: 300;
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 140px;
}

.content a {
  display: inline-block;
  font-weight: 300;
  font-size: 12px;
  text-transform: uppercase;
  border: 1px solid #CDD4DE;
  padding: 8px 14px;
  border-radius: 4px;
  opacity: 0.4;
  cursor: pointer;
  transition: 0.3s;
}

.content a:hover {
  opacity: 1;
  transform: translateY(-2px);
}

/*--------------------
Image
--------------------*/
.page img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: auto;
  z-index: 0;
  transform: scale(1.1);
  transition: transform 0.1s linear;
}
</style>
</head>

<body>

<div class="page">

  <header>
    <div class="logo">
      <svg>
        <use xlink:href="#logo-dailyui"></use>
      </svg>
    </div>

    <nav></nav>

    <div class="search">
      <svg>
        <use xlink:href="#ico-search"></use>
      </svg>
    </div>
  </header>

  <div class="content">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>I tried to catch some fog, but I mist</p>
    <a>Back to home</a>
  </div>

  <img src="https://www.supah.it/dribbble/008/008.jpg" alt="Background">
</div>

<!-- SVG Icons -->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     style="display:none;">

  <symbol id="logo-dailyui" viewBox="0 0 61 14">
    <g>
      <path fill-rule="evenodd" clip-rule="evenodd" fill="#525C7C"
      d="M29.117,0.98h-1.846l-2.407,11.551h6.045l0.334-1.62h-4.198
      L29.117,0.98z M40.132,0.98l-3.365,5.285l-1.2-5.285h-1.885l1.854,7.182
      l-0.926,4.369h1.854l0.889-4.337l4.853-7.214H40.132z"/>
    </g>
  </symbol>

  <symbol id="ico-search" viewBox="0 0 16 16">
    <path fill-rule="evenodd" clip-rule="evenodd" fill="#4F5269"
    d="M14.769,14.769c-0.342,0.342-0.896,0.342-1.237,0l-3.756-3.756
    c-2.399,1.793-5.801,1.623-7.981-0.557c-2.392-2.392-2.392-6.271,0-8.663
    s6.271-2.392,8.662,0c2.18,2.181,2.35,5.583,0.557,7.981
    l3.756,3.756C15.11,13.873,15.11,14.427,14.769,14.769z"/>
  </symbol>

</svg>

<script>
let lFollowX = 0,
    lFollowY = 0,
    x = 0,
    y = 0,
    friction = 1 / 30;

const img = document.querySelector('.page img');

function animate() {
  x += (lFollowX - x) * friction;
  y += (lFollowY - y) * friction;

  const translate = `translate(${x}px, ${y}px) scale(1.1)`;

  img.style.transform = translate;

  requestAnimationFrame(animate);
}

window.addEventListener('mousemove', (e) => {
  const lMouseX = Math.max(-100, Math.min(100, window.innerWidth / 2 - e.clientX));
  const lMouseY = Math.max(-100, Math.min(100, window.innerHeight / 2 - e.clientY));

  lFollowX = (20 * lMouseX) / 100;
  lFollowY = (10 * lMouseY) / 100;
});

window.addEventListener('click', (e) => {
  const lMouseX = Math.max(-100, Math.min(100, window.innerWidth / 2 - e.clientX));
  const lMouseY = Math.max(-100, Math.min(100, window.innerHeight / 2 - e.clientY));

  lFollowX = (20 * lMouseX) / 100;
  lFollowY = (10 * lMouseY) / 100;
});

animate();
</script>

</body>
</html>
